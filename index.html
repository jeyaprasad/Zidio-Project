<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API_BASE = 'http://localhost:8080/api';

function getToken() { return localStorage.getItem('nexushr_token'); }
function getUser() {
  try { return JSON.parse(localStorage.getItem('nexushr_user')); } catch { return null; }
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  const token = getToken();
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(`${API_BASE}${path}`, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || err.message || 'Request failed');
  }
  return res.status === 204 ? null : res.json();
}

function CountUp({ target, suffix = "", duration = 2000 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        let start = null;
        const step = ts => {
          if (!start) start = ts;
          const prog = Math.min((ts - start) / duration, 1);
          setVal(Math.floor(prog * target));
          if (prog < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
        observer.disconnect();
      }
    });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [target, duration]);
  return <span ref={ref}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
  return (
    <div className={`toast ${type === 'error' ? 'toast-error' : 'toast-success'}`}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <span>{type === 'error' ? '✕' : '✓'}</span>
        <span style={{ fontSize: '0.85rem', fontWeight: 500 }}>{message}</span>
      </div>
    </div>
  );
}

// -------- AUTH MODAL --------
function AuthModal({ onClose, onAuth }) {
  const [isLogin, setIsLogin] = useState(true);
  const [form, setForm] = useState({ fullName: '', email: '', password: '', role: 'EMPLOYEE' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleChange = e => setForm(f => ({ ...f, [e.target.name]: e.target.value }));

  const handleSubmit = async e => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const endpoint = isLogin ? '/auth/login' : '/auth/register';
      const body = isLogin ? { email: form.email, password: form.password } : form;
      const data = await api(endpoint, { method: 'POST', body: JSON.stringify(body) });
      localStorage.setItem('nexushr_token', data.token);
      localStorage.setItem('nexushr_user', JSON.stringify(data));
      onAuth(data);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <button className="modal-close" onClick={onClose}>&times;</button>
        <h2>{isLogin ? 'Welcome Back' : 'Create Account'}</h2>
        <p className="sub">{isLogin ? 'Sign in to access your dashboard.' : 'Register for NexusHR access.'}</p>
        <form onSubmit={handleSubmit}>
          {!isLogin && (
            <div className="form-group">
              <label>Full Name</label>
              <input name="fullName" value={form.fullName} onChange={handleChange} required placeholder="John Doe" />
            </div>
          )}
          <div className="form-group">
            <label>Email</label>
            <input name="email" type="email" value={form.email} onChange={handleChange} required placeholder="you@company.com" />
          </div>
          <div className="form-group">
            <label>Password</label>
            <input name="password" type="password" value={form.password} onChange={handleChange} required minLength={6} placeholder="Min 6 characters" />
          </div>
          {!isLogin && (
            <div className="form-group">
              <label>Role</label>
              <select name="role" value={form.role} onChange={handleChange}>
                <option value="EMPLOYEE">Employee</option>
                <option value="MANAGER">Manager</option>
                <option value="HR">HR</option>
                <option value="ADMIN">Admin</option>
              </select>
            </div>
          )}
          {error && <div className="form-error">{error}</div>}
          <button type="submit" className="btn-primary" disabled={loading}>
            {loading ? <span className="loading-spinner" style={{ width: 18, height: 18 }} /> : (isLogin ? 'Sign In' : 'Create Account')}
          </button>
        </form>
        <div className="switch-link">
          {isLogin ? "Don't have an account? " : "Already registered? "}
          <span onClick={() => { setIsLogin(!isLogin); setError(''); }}>{isLogin ? 'Register' : 'Sign In'}</span>
        </div>
      </div>
    </div>
  );
}

// -------- DASHBOARD --------
function Dashboard({ user, onLogout }) {
  const [activeTab, setActiveTab] = useState('employees');
  const [data, setData] = useState([]);
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [formData, setFormData] = useState({});

  const showToast = (msg, type = 'error') => setToast({ message: msg, type });
  const tabs = ['employees', 'attendance', 'payroll', 'performance'];

  const fetchData = useCallback(async () => {
    setLoading(true);
    try {
      const [res, statsRes] = await Promise.all([
        api(`/${activeTab}`),
        api('/dashboard/stats')
      ]);
      setData(res);
      setStats(statsRes);
    } catch (err) {
      showToast(err.message);
    } finally {
      setLoading(false);
    }
  }, [activeTab]);

  useEffect(() => { fetchData(); }, [fetchData]);

  const handleDelete = async id => {
    if (!confirm('Delete this record?')) return;
    try {
      await api(`/${activeTab}/${id}`, { method: 'DELETE' });
      showToast('Deleted successfully', 'success');
      fetchData();
    } catch (err) { showToast(err.message); }
  };

  const handleSubmit = async e => {
    e.preventDefault();
    try {
      const method = editing ? 'PUT' : 'POST';
      const url = editing ? `/${activeTab}/${editing}` : `/${activeTab}`;
      await api(url, { method, body: JSON.stringify(formData) });
      showToast(editing ? 'Updated successfully' : 'Created successfully', 'success');
      setShowForm(false);
      setEditing(null);
      fetchData();
    } catch (err) { showToast(err.message); }
  };

  const openForm = (item = null) => {
    if (item) {
      setEditing(item.id);
      setFormData(item);
    } else {
      setEditing(null);
      setFormData({});
    }
    setShowForm(true);
  };

  const renderTable = () => {
    if (loading) return <div className="dash-empty"><div className="loading-spinner" /></div>;
    if (!data.length) return <div className="dash-empty">No records found.</div>;

    const cols = {
      employees: [
        { key: 'employeeId', label: 'ID' },
        { key: 'firstName', label: 'First Name' },
        { key: 'lastName', label: 'Last Name' },
        { key: 'email', label: 'Email' },
        { key: 'department', label: 'Department' },
        { key: 'position', label: 'Position' },
        { key: 'status', label: 'Status', render: v => <span className={`status-badge status-${v === 'ACTIVE' ? 'active' : v === 'PENDING' ? 'pending' : 'inactive'}`}>{v}</span> },
      ],
      attendance: [
        { key: 'employeeName', label: 'Employee' },
        { key: 'date', label: 'Date' },
        { key: 'checkIn', label: 'Check In' },
        { key: 'checkOut', label: 'Check Out' },
        { key: 'status', label: 'Status', render: v => <span className={`status-badge ${v === 'PRESENT' ? 'status-active' : v === 'LATE' ? 'status-pending' : 'status-inactive'}`}>{v}</span> },
      ],
      payroll: [
        { key: 'employeeName', label: 'Employee' },
        { key: 'payPeriod', label: 'Period' },
        { key: 'basicSalary', label: 'Basic', render: v => `$${(v || 0).toLocaleString()}` },
        { key: 'netSalary', label: 'Net', render: v => `$${(v || 0).toLocaleString()}` },
        { key: 'status', label: 'Status', render: v => <span className={`status-badge ${v === 'PAID' ? 'status-active' : 'status-pending'}`}>{v}</span> },
      ],
      performance: [
        { key: 'employeeName', label: 'Employee' },
        { key: 'reviewerName', label: 'Reviewer' },
        { key: 'reviewDate', label: 'Date' },
        { key: 'rating', label: 'Rating' },
        { key: 'status', label: 'Status' },
      ],
    };

    const currentCols = cols[activeTab] || [];

    return (
      <table className="dash-table">
        <thead><tr>{currentCols.map(c => <th key={c.key}>{c.label}</th>)}<th>Actions</th></tr></thead>
        <tbody>
          {data.map((item, i) => (
            <tr key={item.id || i}>
              {currentCols.map(c => (
                <td key={c.key}>{c.render ? c.render(item[c.key]) : item[c.key] ?? '-'}</td>
              ))}
              <td>
                <div className="dash-actions">
                  <button className="btn-ghost btn-sm" onClick={() => openForm(item)}>Edit</button>
                  <button className="btn-danger btn-sm" onClick={() => handleDelete(item.id)}>Delete</button>
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    );
  };

  return (
    <div className="dashboard">
      {toast && <Toast {...toast} onClose={() => setToast(null)} />}

      <div className="dash-header">
        <div className="dash-welcome">
          <h1>Dashboard</h1>
          <p>Welcome back, {user.fullName} · <span style={{ textTransform: 'capitalize' }}>{user.role.toLowerCase()}</span></p>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <button className="btn-primary" onClick={() => openForm()}>+ New</button>
          <button className="btn-ghost" onClick={onLogout}>Sign Out</button>
        </div>
      </div>

      <div className="dash-cards">
        <div className="dash-card">
          <div className="dash-card-label">Total Employees</div>
          <div className="dash-card-value gradient-text">{stats?.totalEmployees ?? '-'}</div>
        </div>
        <div className="dash-card">
          <div className="dash-card-label">Active</div>
          <div className="dash-card-value" style={{ color: 'var(--green)' }}>{stats?.activeEmployees ?? '-'}</div>
        </div>
        <div className="dash-card">
          <div className="dash-card-label">Present Today</div>
          <div className="dash-card-value" style={{ color: 'var(--teal)' }}>{stats?.presentToday ?? '-'}</div>
        </div>
        <div className="dash-card">
          <div className="dash-card-label">Absent Today</div>
          <div className="dash-card-value" style={{ color: 'var(--yellow)' }}>{stats?.absentToday ?? '-'}</div>
        </div>
      </div>

      <div className="dash-tabs">
        {tabs.map(t => (
          <button key={t} className={`dash-tab ${activeTab === t ? 'active' : ''}`} onClick={() => setActiveTab(t)}>
            {t.charAt(0).toUpperCase() + t.slice(1)}
          </button>
        ))}
      </div>

      {showForm && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowForm(false)}>
          <div className="modal">
            <button className="modal-close" onClick={() => setShowForm(false)}>&times;</button>
            <h2>{editing ? 'Edit' : 'New'} {activeTab.slice(0, -1).charAt(0).toUpperCase() + activeTab.slice(0, -1).slice(1)}</h2>
            <form onSubmit={handleSubmit}>
              {Object.entries(formData).filter(([k]) => !['id', 'createdAt', 'updatedAt', 'employeeName', 'reviewerName'].includes(k)).map(([key, val]) => (
                <div key={key} className="form-group">
                  <label>{key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase())}</label>
                  <input name={key} value={formData[key] ?? ''} onChange={e => setFormData(f => ({ ...f, [e.target.name]: e.target.value }))} />
                </div>
              ))}
              <button type="submit" className="btn-primary">{editing ? 'Update' : 'Create'}</button>
            </form>
          </div>
        </div>
      )}

      <div className="dash-table-wrap">
        {renderTable()}
      </div>
    </div>
  );
}

// -------- APP --------
function App() {
  const [user, setUser] = useState(getUser);
  const [showAuth, setShowAuth] = useState(false);

  const handleAuth = data => {
    setUser(data);
    setShowAuth(false);
  };

  const handleLogout = () => {
    localStorage.removeItem('nexushr_token');
    localStorage.removeItem('nexushr_user');
    setUser(null);
  };

  return (
    <>
      <nav>
        <div className="nav-logo">
          <div className="logo-icon">N</div>
          NexusHR
        </div>
        {!user && (
          <div className="nav-links">
            <a onClick={() => document.getElementById('features')?.scrollIntoView({ behavior: 'smooth' })}>Features</a>
            <a onClick={() => document.getElementById('architecture')?.scrollIntoView({ behavior: 'smooth' })}>Architecture</a>
            <a onClick={() => document.getElementById('security')?.scrollIntoView({ behavior: 'smooth' })}>Security</a>
          </div>
        )}
        <div className="nav-cta">
          {user ? (
            <>
              <span style={{ color: 'var(--text-dim)', fontSize: '0.85rem' }}>{user.email}</span>
              <button className="btn-ghost" onClick={handleLogout}>Sign Out</button>
            </>
          ) : (
            <>
              <button className="btn-ghost" onClick={() => setShowAuth(true)}>Sign In</button>
              <button className="btn-primary" onClick={() => setShowAuth(true)}>Get Started</button>
            </>
          )}
        </div>
      </nav>

      {user ? (
        <Dashboard user={user} onLogout={handleLogout} />
      ) : (
        <LandingPage onOpenAuth={() => setShowAuth(true)} />
      )}

      {showAuth && <AuthModal onClose={() => setShowAuth(false)} onAuth={handleAuth} />}
    </>
  );
}
