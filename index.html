<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NexusHR – AI-Enabled Enterprise HR & Workforce Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #080D1C;
    --surface: #111827;
    --surface2: #1a2540;
    --indigo: #5B6EF5;
    --indigo-light: #7C8DF7;
    --teal: #00C8B4;
    --teal-dim: rgba(0,200,180,0.12);
    --muted: #64748B;
    --text: #E2E8F0;
    --text-dim: #94A3B8;
    --border: rgba(255,255,255,0.07);
    --glow-indigo: rgba(91,110,245,0.35);
    --glow-teal: rgba(0,200,180,0.25);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--indigo); border-radius: 3px; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 64px;
    background: rgba(8,13,28,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.15rem; letter-spacing: -0.5px; }
  .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--indigo), var(--teal));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900;
  }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }
  .nav-cta { display: flex; gap: 12px; align-items: center; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 8px 18px; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn-ghost:hover { border-color: var(--indigo); color: var(--text); }
  .btn-primary { background: var(--indigo); color: #fff; border: none; padding: 8px 20px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn-primary:hover { background: var(--indigo-light); box-shadow: 0 0 20px var(--glow-indigo); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; align-items: center;
    padding: 100px 5% 60px;
    position: relative; overflow: hidden;
  }
  .hero-bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(91,110,245,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,110,245,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .hero-glow {
    position: absolute; top: -200px; left: -200px;
    width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(91,110,245,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-glow-2 {
    position: absolute; bottom: -150px; right: -100px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,200,180,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-content { position: relative; z-index: 1; max-width: 640px; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(91,110,245,0.12); border: 1px solid rgba(91,110,245,0.3);
    border-radius: 100px; padding: 5px 14px 5px 8px;
    font-size: 0.75rem; font-weight: 600; color: var(--indigo-light);
    margin-bottom: 24px; letter-spacing: 0.3px;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse-dot 2s ease-in-out infinite; }

  .hero h1 {
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 900; line-height: 1.08;
    letter-spacing: -2px; margin-bottom: 20px;

  .gradient-text {
    background: linear-gradient(135deg, var(--indigo-light), var(--teal));

    background-clip: text;

  .hero p { color: var(--text-dim); font-size: 1.05rem; line-height: 1.75; margin-bottom: 36px; max-width: 520px; }
  .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 56px; }
  .btn-large { padding: 14px 28px; font-size: 0.95rem; border-radius: 10px; }
  .btn-outline-large {
    background: none; border: 1px solid var(--border);
    color: var(--text); padding: 14px 28px; border-radius: 10px;
    font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit;
    display: flex; align-items: center; gap: 8px;

  .btn-outline-large:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
  .hero-stats { display: flex; gap: 32px; flex-wrap: wrap; }

  .hero-stat span { font-size: 0.8rem; color: var(--text-dim); font-weight: 500; }
  .hero-stat-divider { width: 1px; background: var(--border); }

  /* PULSE TICKER */
  .hero-visual {

    transform: translateY(-50%);
    width: 340px; z-index: 1;
    display: flex; flex-direction: column; gap: 12px;

    border: 1px solid var(--border);

  .ticker-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;

  .ticker-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 2px; font-weight: 500; }
  .ticker-value { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; }
  .ticker-badge {
    margin-left: auto; font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 20px;

  .up { color: #34d399; background: rgba(52,211,153,0.12); }
  .neutral { color: var(--indigo-light); background: rgba(91,110,245,0.12); }
  .warn { color: #fbbf24; background: rgba(251,191,36,0.12); }

  /* TECH STACK */
  .tech-strip {
    padding: 20px 5%;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    overflow: hidden; position: relative;
  }
  .tech-strip-inner { display: flex; gap: 48px; animation: scroll-x 25s linear infinite; width: max-content; }
  @keyframes scroll-x { from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .tech-item { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
  .tech-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--indigo); opacity: 0.5; }

  /* SECTIONS */
  section { padding: 90px 5%; }
  .section-eyebrow { font-size: 0.72rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; }
  .section-title { font-size: clamp(1.8rem, 3.5vw, 2.6rem); font-weight: 800; letter-spacing: -1px; line-height: 1.2; margin-bottom: 16px; }
  .section-subtitle { color: var(--text-dim); font-size: 1rem; max-width: 520px; line-height: 1.7; }

  /* FEATURES */
  .features-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 56px; }
  .feature-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px;
    transition: all 0.3s ease; position: relative; overflow: hidden;
  }
  .feature-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--indigo), transparent);
    opacity: 0; transition: opacity 0.3s;

  .feature-card:hover { border-color: rgba(91,110,245,0.3); transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
  .feature-card:hover::before { opacity: 1; }
  .feature-icon {
    width: 48px; height: 48px; border-radius: 12px; margin-bottom: 18px;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .feature-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
  .feature-card p { font-size: 0.875rem; color: var(--text-dim); line-height: 1.65; }

  /* STATS */
  .stats-section {
    background: linear-gradient(135deg, rgba(91,110,245,0.08), rgba(0,200,180,0.05));
    border: 1px solid var(--border); border-radius: 24px;

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 48px; margin-top: 48px; }
  .stat-item { text-align: center; }
  .stat-number { font-size: 3rem; font-weight: 900; letter-spacing: -2px; line-height: 1; margin-bottom: 8px; }
  .stat-label { font-size: 0.85rem; color: var(--text-dim); font-weight: 500; }

  /* ARCHITECTURE */
  .arch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; margin-top: 56px; }
  .arch-diagram {
    background: var(--surface); border: 1px solid var(--border);

  .arch-layer { margin-bottom: 12px; }
  .arch-layer-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .arch-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .arch-pill {

    border: 1px solid var(--border);

  .pill-blue { background: rgba(91,110,245,0.12); border-color: rgba(91,110,245,0.25); color: var(--indigo-light); }
  .pill-teal { background: rgba(0,200,180,0.1); border-color: rgba(0,200,180,0.2); color: var(--teal); }
  .pill-gray { background: rgba(100,116,139,0.12); border-color: rgba(100,116,139,0.2); color: var(--text-dim); }
  .arch-connector { border-left: 2px dashed var(--border); height: 20px; margin-left: 16px; margin-top: -4px; margin-bottom: -4px; }

  .arch-features { display: flex; flex-direction: column; gap: 20px; }
  .arch-feature-item { display: flex; gap: 16px; align-items: flex-start; }
  .arch-feature-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .arch-feature-item h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
  .arch-feature-item p { font-size: 0.83rem; color: var(--text-dim); line-height: 1.6; }

  /* SECURITY */
  .security-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-top: 48px; }
  .security-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
    display: flex; gap: 14px; align-items: flex-start;
  }
  .check-icon { width: 28px; height: 28px; border-radius: 7px; background: rgba(0,200,180,0.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--teal); font-size: 14px; }
  .security-item strong { display: block; font-size: 0.875rem; font-weight: 700; margin-bottom: 3px; }
  .security-item span { font-size: 0.78rem; color: var(--text-dim); }

  /* CTA */
  .cta-section {
    text-align: center; padding: 100px 5%;
    position: relative; overflow: hidden;
  }
  .cta-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(91,110,245,0.1) 0%, transparent 65%);
    pointer-events: none;
  }
  .cta-section h2 { font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 900; letter-spacing: -1.5px; margin-bottom: 20px; position: relative; }
  .cta-section p { color: var(--text-dim); font-size: 1.05rem; margin-bottom: 40px; position: relative; max-width: 500px; margin-left: auto; margin-right: auto; }
  .cta-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; position: relative; }
  .btn-teal { background: var(--teal); color: #080D1C; border: none; padding: 14px 32px; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn-teal:hover { box-shadow: 0 0 28px var(--glow-teal); transform: translateY(-1px); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 40px 5%;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: gap;
    color: var(--muted); font-size: 0.82rem;
  }
  .footer-links { display: flex; gap: 24px; }
  .footer-links a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--text-dim); }

  @media (max-width: 900px) {
    .hero-visual { display: none; }
    .arch-grid { grid-template-columns: 1fr; }
    nav .nav-links { display: none; }
    .hero-stats { gap: 24px; }
    .hero-stat-divider { display: none; }
  }
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
    footer { flex-direction: column; gap: 16px; text-align: center; }
  }
</style>
</head>
<body>
<div id="root"></div>

  { icon: "📊", color: "rgba(167,139,250,0.12)", title: "Performance Management", desc: "OKR and KPI frameworks, 360° reviews, continuous feedback loops, and calibration tools for fair appraisals." },

  { icon: "🔔", color: "rgba(251,191,36,0.12)", title: "Real-Time Notifications", desc: "WebSocket-driven event system with configurable alerts for approvals, deadlines, policy changes, and compliance reminders." },
  { icon: "🛡️", color: "rgba(167,139,250,0.12)", title: "Role-Based Access Control", desc: "Granular RBAC with field-level permissions, audit trails, and delegation rules ensuring data privacy across all modules." },

const SECURITY = [

];

const TECH = ["Java 21", "Spring Boot 3", "React 18", "TypeScript", "PostgreSQL", "Redis", "Docker", "Kubernetes", "Spring AI", "Prometheus", "Grafana", "JWT Auth"];

function CountUp({ target, suffix = "", duration = 2000 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        let start = null;
        const step = ts => {
          if (!start) start = ts;
          const prog = Math.min((ts - start) / duration, 1);
          setVal(Math.floor(prog * target));
          if (prog < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
        observer.disconnect();
      }
    });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [target, duration]);
  return <span ref={ref}>{val.toLocaleString()}{suffix}</span>;
}

            <div className="hero-stat">

            <div className="hero-stat">

        <div className="hero-visual">

                <div className="ticker-value">{t.value}</div>
              </div>
              <span className={`ticker-badge ${t.cls}`}>{t.badge}</span>
            </div>
          ))}
        </div>
      </div>

      {/* TECH STRIP */}
      <div className="tech-strip">
        <div className="tech-strip-inner">
          {techDouble.map((t, i) => (
            <div key={i} className="tech-item">
              <div className="tech-dot" />
              {t}
            </div>
          ))}
        </div>
      </div>

      {/* FEATURES */}
      <section id="features">
        <div className="section-eyebrow">Platform Features</div>
        <div className="section-title">Everything HR.<br />Nothing Redundant.</div>
        <p className="section-subtitle">Eight integrated modules replacing fragmented point solutions — all under a unified data model with real-time sync.</p>
        <div className="features-grid">
          {FEATURES.map((f, i) => (
            <div key={i} className="feature-card">
              <div className="feature-icon" style={{ background: f.color }}>{f.icon}</div>
              <h3>{f.title}</h3>
              <p>{f.desc}</p>
            </div>
          ))}
        </div>
      </section>

      {/* STATS */}
      <div className="stats-section">
        <div className="section-eyebrow" style={{ textAlign: 'center' }}>Platform Impact</div>
        <div className="section-title" style={{ textAlign: 'center' }}>Built for Scale,<br /><span className="gradient-text">Proven in Production</span></div>
        <div className="stats-grid">
          {[
            { n: 12, s: "k+", l: "Employee records managed" },
            { n: 99, s: ".9%", l: "System uptime guaranteed" },
            { n: 40, s: "%", l: "Reduction in HR overhead" },
            { n: 200, s: "ms", l: "Average API response time" },
          ].map((st, i) => (
            <div key={i} className="stat-item">
              <div className="stat-number gradient-text">
                <CountUp target={st.n} suffix={st.s} />
              </div>
              <div className="stat-label">{st.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ARCHITECTURE */}
      <section id="architecture">
        <div className="section-eyebrow">Technical Architecture</div>
        <div className="section-title">Modern Stack,<br /><span className="gradient-text">Enterprise-Ready</span></div>
        <div className="arch-grid">
          <div className="arch-diagram">
            {ARCH_LAYERS.map((layer, i) => (
              <div key={i} className="arch-layer">
                <div className="arch-layer-label">{layer.label}</div>
                <div className="arch-pills">
                  {layer.pills.map((p, j) => (
                    <span key={j} className={`arch-pill ${p.c}`}>{p.l}</span>
                  ))}
                </div>
                {i < ARCH_LAYERS.length - 1 && <div className="arch-connector" />}
              </div>
            ))}
          </div>
          <div className="arch-features">
            {[
              { icon: "⚡", bg: "rgba(91,110,245,0.15)", title: "Spring Boot 3 Backend", desc: "Modular microservice-ready architecture with Spring Security, Spring Data JPA, and WebSocket support for real-time features." },
              { icon: "🧠", bg: "rgba(0,200,180,0.12)", title: "Spring AI Integration", desc: "LLM-powered attrition models, NLP document parsing, and intelligent workforce recommendations baked into core workflows." },
              { icon: "📦", bg: "rgba(251,191,36,0.1)", title: "Containerized Deployment", desc: "Docker images with Kubernetes orchestration ensuring zero-downtime deployments, auto-scaling, and full cloud portability." },
            ].map((item, i) => (
              <div key={i} className="arch-feature-item">
                <div className="arch-feature-icon" style={{ background: item.bg }}>{item.icon}</div>
                <div>
                  <h4>{item.title}</h4>
                  <p>{item.desc}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* SECURITY */}
      <section id="security" style={{ background: 'linear-gradient(180deg, transparent, rgba(0,200,180,0.03), transparent)' }}>
        <div className="section-eyebrow">Security & Infrastructure</div>
        <div className="section-title">Secure by Design,<br /><span className="gradient-text">Compliant by Default</span></div>
        <p className="section-subtitle">NexusHR follows industry best practices across authentication, data protection, observability, and deployment reliability.</p>
        <div className="security-grid">
          {SECURITY.map((s, i) => (
            <div key={i} className="security-item">
              <div className="check-icon">✓</div>
              <div>
                <strong>{s.title}</strong>
                <span>{s.desc}</span>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* CTA */}
      <div className="cta-section" id="about">
        <div className="cta-bg" />
        <div className="section-eyebrow" style={{ position: 'relative' }}>Get Started</div>
        <h2>Ready to Transform<br /><span className="gradient-text">Your Workforce Operations?</span></h2>
        <p>NexusHR opens for early access on 6 July 2026. Join the waitlist and get priority onboarding, dedicated support, and 60 days free.</p>
        <div className="cta-actions">
          <button className="btn-teal btn-large">Join the Waitlist</button>
          <button className="btn-ghost btn-large" style={{ padding: '14px 28px', fontSize: '0.95rem' }}>View on GitHub</button>
        </div>
      </div>

      {/* FOOTER */}
      <footer>
        <div className="nav-logo">
          <div className="logo-icon">N</div>
          NexusHR
          <span style={{ color: 'var(--muted)', fontWeight: 400, fontSize: '0.8rem', marginLeft: 4 }}>© 2026</span>
        </div>
        <div className="footer-links">
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Docs</a>
          <a href="#">GitHub</a>
        </div>
        <span>Built with Java 21 · Spring Boot · React · Spring AI</span>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
