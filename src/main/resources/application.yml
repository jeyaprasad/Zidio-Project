server:
  port: 8080

spring:
  application:
    name: nexushr
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

  ai:
    huggingface:
      chat:
        api-key: ${HF_API_KEY:mock-key}
        url: ${HF_ENDPOINT_URL:https://api-inference.huggingface.co/models/meta-llama/Llama-3-8b-chat-hf}

app:
  jwt:
    # SECURITY: Never hardcode this. Set APP_JWT_SECRET env var in production (Kubernetes Secret / .env file).
    # The fallback below is ONLY for local dev. Generate with: openssl rand -hex 64
    secret: ${APP_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A47}
    expiration-ms: 86400000
  cors:
    # Comma-separated list; override via APP_CORS_ALLOWED_ORIGINS env var in prod
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.zidio.nexushr: DEBUG
    org.springframework.security: INFO
sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 1.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

huggingface:
  api:
    token: ${HUGGINGFACE_API_TOKEN:}
    url: "https://api-inference.huggingface.co/models/cardiffnlp/twitter-roberta-base-sentiment-latest"
