apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexushr-frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nexushr-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: webport
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: frontend
