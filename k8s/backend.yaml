apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  SPRING_PROFILES_ACTIVE: "prod"
  # DB_HOST must match the Kubernetes Service name for PostgreSQL
  DB_HOST: "db"
  DB_PORT: "5432"
  DB_NAME: "nexushr"
  # Redis Service name
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  # HuggingFace model endpoint (app reads HF_ENDPOINT_URL)
  HF_ENDPOINT_URL: "https://api-inference.huggingface.co/models/meta-llama/Llama-3-8b-chat-hf"
  # CORS — comma-separated list of allowed frontend origins
  APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
data:
  # Base64-encoded values. Replace ALL placeholders before deploying to production.
  # Generate JWT secret: openssl rand -hex 64 | base64
  APP_JWT_SECRET: "" # TODO: set before deploy
  # HuggingFace API key (app reads HF_API_KEY)
  HF_API_KEY: "" # TODO: set before deploy — base64(your-hf-token)
  SENTRY_DSN: ""
  DB_USERNAME: cG9zdGdyZXM= # base64 for "postgres" — change in prod
  DB_PASSWORD: cG9zdGdyZXM= # base64 for "postgres" — change in prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexushr-backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nexushr-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: backendport
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: APP_JWT_SECRET
            - name: HF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: HF_API_KEY
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SENTRY_DSN
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: backend
