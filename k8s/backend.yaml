apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/nexushr"
  SPRING_DATA_REDIS_HOST: "redis"
  OPENAI_MODEL: "gpt-4o-mini"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
data:
  # Base64 encoded values (defaults to placeholder "mock-key" or empty for testing)
  OPENAI_API_KEY: bW9jay1rZXk= # base64 for "mock-key"
  SENTRY_DSN: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexushr-backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nexushr-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: backendport
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: OPENAI_API_KEY
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SENTRY_DSN
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: backend
