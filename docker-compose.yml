services:
  # 1. PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: nexushr-db
    environment:
      POSTGRES_DB: nexushr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nexushr-redis
    ports:
      - "6379:6379"

  # 3. Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexushr-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod  # Use Postgres configuration
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/nexushr
      - SPRING_DATA_REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY:-mock-key}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      - db
      - redis

  # 4. React 19 Frontend (Dev environment with Hot Reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: nexushr-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # 5. Prometheus Metrics Scraper
  prometheus:
    image: prom/prometheus:latest
    container_name: nexushr-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    depends_on:
      - backend

  # 6. Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: nexushr-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
