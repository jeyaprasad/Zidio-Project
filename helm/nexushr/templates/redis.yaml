apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexushr.fullname" . }}-redis
  labels:
    app: {{ include "nexushr.name" . }}-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "nexushr.name" . }}-redis
  template:
    metadata:
      labels:
        app: {{ include "nexushr.name" . }}-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          ports:
            - containerPort: 6379
              name: redisport
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexushr.fullname" . }}-redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: {{ include "nexushr.name" . }}-redis
